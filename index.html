    <meta property="og:type" content="website" />

    <link rel="apple-touch-icon" href="/logo.png" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "WebSite",
            "@id": "https://comixa-ui.vercel.app/#website",
            "url": "https://comixa-ui.vercel.app",
            "name": "Comixa UI",
            "description": "Comic-inspired React component library and documentation",
            "inLanguage": "en"
          },
          {
            "@type": "SoftwareSourceCode",
            "name": "Comixa UI",
            "codeRepository": "https://github.com/emresates/comixa-ui",
            "programmingLanguage": ["TypeScript", "React", "CSS"],
            "runtimePlatform": "React",
            "url": "https://comixa-ui.vercel.app",
            "description": "Comixa is a comic-inspired React UI component library built with Tailwind CSS."
          }
        ]
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Antonio:wght@700&family=Baloo+2:wght@700;800&family=Bangers&family=Bebas+Neue&family=Comic+Neue:wght@400;700&family=Cormorant+Garamond:wght@700&family=Lilita+One&display=swap"
      rel="stylesheet"
    />
    <script>
      (function () {
        try {
          var key = "comixa-playground-theme";
          var stored = localStorage.getItem(key);
          // Only dark when user explicitly chose dark (default = light)
          var dark = stored === "dark";
          document.documentElement.classList.toggle("dark", dark);
          document.documentElement.setAttribute(
            "data-theme",
            dark ? "dark" : "light"
          );
        } catch (e) {
          document.documentElement.classList.remove("dark");
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
